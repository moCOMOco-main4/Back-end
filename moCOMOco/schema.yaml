components:
  schemas:
    ApplicationCreate:
      type: object
      properties:
        role:
          type: string
      required:
      - role
    CategoryEnum:
      enum:
      - project
      - study
      type: string
      description: |-
        * `project` - 프로젝트
        * `study` - 스터디
    ChatMessage:
      type: object
      properties:
        ChatMessage_id:
          type: integer
          readOnly: true
        chat_user_id:
          type: integer
          readOnly: true
        nickname:
          type: string
          readOnly: true
        profile_image:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - ChatMessage_id
      - chat_user_id
      - created_at
      - nickname
      - profile_image
    ChatMessageCreate:
      type: object
      properties:
        ChatMessage_id:
          type: integer
          readOnly: true
        room_id:
          type: string
          readOnly: true
        chat_user_id:
          type: integer
          readOnly: true
        content:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - ChatMessage_id
      - chat_user_id
      - content
      - created_at
      - room_id
