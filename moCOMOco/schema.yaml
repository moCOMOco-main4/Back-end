          type: integer
        title:
          type: string
        category:
          type: string
        date:
          type: string
          format: date-time
        place_name:
          type: string
        role:
          type: string
        is_closed:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
