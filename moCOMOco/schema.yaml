      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /api/auth/users/me/upload-image/:
    post:
      operationId: api_auth_users_me_upload_image_create
      description: 프로필 이미지 업로드 전용 엔드포인트
      parameters:
      - in: form
        name: profile_image_file
        schema:
          type: string
          format: binary
        description: 업로드할 프로필 이미지
        required: true
      tags:
      - api
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                profile_image_file:
                  type: string
                  format: binary
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: No response body
  /api/auth/users/position/:
    post:
      operationId: api_auth_users_position_create
      description: 사용자 포지션 관리 API 뷰
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: No response body
    patch:
      operationId: api_auth_users_position_partial_update
      description: 사용자 포지션 관리 API 뷰
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          description: No response body
  /api/v1/posts/:
    get:
      operationId: api_v1_posts_list
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PostList'
          description: ''
  /api/v1/posts/{id}/:
    get:
      operationId: api_v1_posts_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostDetail'
          description: ''
  /api/v1/posts/{id}/detailed/:
    get:
      operationId: api_v1_posts_detailed_retrieve
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostSimpleDetail'
          description: ''
  /api/v1/posts/{id}/like/:
    post:
      operationId: api_v1_posts_like_create
      description: 모집글을 즐겨찾기에 추가합니다. 중복 추가는 허용되지 않습니다.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          description: No response body
  /api/v1/posts/{post_id}/apply/:
    post:
      operationId: api_v1_posts_apply_create
      description: 모집글에 역할 기반으로 참여 신청합니다.
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ApplicationCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MyApplication'
          description: ''
  /api/v1/posts/{post_id}/cancel/:
    delete:
      operationId: api_v1_posts_cancel_destroy
      description: 참여했던 모집글에서 신청을 취소합니다.
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/posts/{post_id}/schedule/:
    post:
      operationId: api_v1_posts_schedule_create
      description: 모집글에 일정 정보를 등록합니다. 작성자만 등록할 수 있습니다.
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleCreate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ScheduleCreate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScheduleCreate'
        required: true
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleList'
          description: ''
  /api/v1/posts/{post_id}/schedule/{id}/:
    put:
      operationId: api_v1_posts_schedule_update
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ScheduleUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ScheduleUpdate'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleUpdate'
          description: ''
    patch:
      operationId: api_v1_posts_schedule_partial_update
      description: 기존 등록된 일정을 수정합니다. 작성자만 수정 가능합니다.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedScheduleUpdate'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedScheduleUpdate'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedScheduleUpdate'
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScheduleList'
          description: ''
  /api/v1/posts/{post_id}/schedule/{id}/delete/:
    delete:
      operationId: api_v1_posts_schedule_delete_destroy
      description: 등록된 일정을 삭제합니다. 작성자만 삭제 가능합니다.
      parameters:
      - in: path
        name: id
        schema:
          type: integer
        required: true
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      responses:
        '204':
          description: No response body
  /api/v1/posts/{post_id}/schedule/list/:
    get:
      operationId: api_v1_posts_schedule_list_list
      description: 특정 모집글에 등록된 전체 일정 목록을 조회합니다. (post_id를 쿼리 파라미터로 전달)
      parameters:
      - in: path
        name: post_id
        schema:
          type: integer
        required: true
      tags:
      - api
      security:
      - cookieAuth: []
      - basicAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ScheduleList'
          description: ''
  /api/v1/posts/applied/:
